name: Vocably
options:
  bundleIdPrefix: app.vocably
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  VocablyCore:
    path: Packages/VocablyCore
targets:
  Vocably:
    type: application
    platform: iOS
    sources:
      - path: Vocably
    dependencies:
      - package: VocablyCore
        product: VocablyDomain
      - package: VocablyCore
        product: SRSEngine
      - package: VocablyCore
        product: VocablyServices
      - package: VocablyCore
        product: VocablyPresentation
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.vocably
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Vocably
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
